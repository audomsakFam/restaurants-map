version: '3.8'
name: restaurants-app-v1
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: restaurants-db
    container_name: restaurants-db
    ports:
      - "5432:5432"
    volumes:
      - db-restaurants-data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_restaurants_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_restaurants_data:
  db-restaurants-data:
